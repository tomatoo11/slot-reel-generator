<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現在の天気</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      color: #202124;
      background: #f4f7f8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      border: 1px solid #d8e0e4;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(32, 33, 36, 0.08);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 26px;
      line-height: 1.3;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid #b9c4ca;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      flex: 0 0 auto;
      border: 0;
      border-radius: 6px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background: #0f766e;
      cursor: pointer;
    }

    button:hover {
      background: #115e59;
    }

    button:disabled {
      background: #8aa6a2;
      cursor: wait;
    }

    .message {
      margin-top: 16px;
      color: #b42318;
      min-height: 24px;
    }

    .weather-box {
      margin-top: 20px;
      padding: 18px;
      border: 1px solid #d8e0e4;
      border-radius: 8px;
      background: #fbfcfc;
      display: none;
    }

    .city-name {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 700;
    }

    dl {
      margin: 0;
      display: grid;
      grid-template-columns: 90px 1fr;
      row-gap: 10px;
      column-gap: 12px;
    }

    dt {
      color: #5f6b70;
      font-weight: 700;
    }

    dd {
      margin: 0;
    }

    @media (max-width: 420px) {
      main {
        padding: 22px;
      }

      .search-row {
        flex-direction: column;
      }

      button {
        min-height: 46px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>現在の天気</h1>

    <label for="cityInput">都市名</label>
    <div class="search-row">
      <input id="cityInput" type="text" placeholder="例: Tokyo" autocomplete="off">
      <button id="searchButton" type="button">検索</button>
    </div>

    <p id="message" class="message" aria-live="polite"></p>

    <section id="weatherBox" class="weather-box" aria-live="polite">
      <p id="cityName" class="city-name"></p>
      <dl>
        <dt>天気</dt>
        <dd id="weatherText"></dd>
        <dt>気温</dt>
        <dd id="temperatureText"></dd>
        <dt>湿度</dt>
        <dd id="humidityText"></dd>
      </dl>
    </section>
  </main>

  <script>
    const API_KEY = "ece182652f943f6e8ee13fab4c7e64a9";

    const cityInput = document.getElementById("cityInput");
    const searchButton = document.getElementById("searchButton");
    const message = document.getElementById("message");
    const weatherBox = document.getElementById("weatherBox");
    const cityName = document.getElementById("cityName");
    const weatherText = document.getElementById("weatherText");
    const temperatureText = document.getElementById("temperatureText");
    const humidityText = document.getElementById("humidityText");

    searchButton.addEventListener("click", fetchWeather);
    cityInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        fetchWeather();
      }
    });

    async function fetchWeather() {
      const city = cityInput.value.trim();

      message.textContent = "";
      weatherBox.style.display = "none";

      if (!city) {
        message.textContent = "都市名を入力してください。";
        return;
      }

      if (!API_KEY || API_KEY === "ここにOpenWeatherMapのAPIキーを入力してください") {
        message.textContent = "HTML内のAPI_KEYにOpenWeatherMapのAPIキーを設定してください。";
        return;
      }

      searchButton.disabled = true;
      searchButton.textContent = "検索中";

      try {
        const url = new URL("https://api.openweathermap.org/data/2.5/weather");
        url.searchParams.set("q", city);
        url.searchParams.set("appid", API_KEY);
        url.searchParams.set("units", "metric");
        url.searchParams.set("lang", "ja");

        const response = await fetch(url);
        const data = await response.json();

        if (!response.ok) {
          if (data.cod === "404") {
            throw new Error("都市が見つかりませんでした。英字表記も試してください。");
          }

          throw new Error("天気情報を取得できませんでした。APIキーや都市名を確認してください。");
        }

        const weather = data.weather && data.weather[0] ? data.weather[0].description : "不明";
        const temperature = Math.round(data.main.temp * 10) / 10;
        const humidity = data.main.humidity;

        cityName.textContent = data.name;
        weatherText.textContent = weather;
        temperatureText.textContent = `${temperature} ℃`;
        humidityText.textContent = `${humidity} %`;
        weatherBox.style.display = "block";
      } catch (error) {
        message.textContent = error.message;
      } finally {
        searchButton.disabled = false;
        searchButton.textContent = "検索";
      }
    }
  </script>
</body>
</html>
